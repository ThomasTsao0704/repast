
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:ital,wght@0,400;0,500;1,400&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'DM Sans',sans-serif;background:var(--color-background-tertiary)}
.page{padding:1.5rem}

/* ── HERO ── */
.hero{background:linear-gradient(135deg,#FFF7ED 0%,#FAEEDA 60%,#FAC775 100%);border-radius:20px;padding:2.5rem 2rem 2rem;margin-bottom:1.75rem;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;right:-40px;top:-40px;width:220px;height:220px;background:radial-gradient(circle,rgba(239,159,39,.18) 0%,transparent 70%);pointer-events:none}
.hero-label{font-size:11px;font-weight:500;letter-spacing:.1em;text-transform:uppercase;color:#854F0B;margin-bottom:.5rem}
.hero h1{font-family:'Playfair Display',serif;font-size:2rem;font-weight:700;color:#2C1810;line-height:1.25;margin-bottom:.4rem}
.hero p{font-size:14px;color:#7A4A1E;margin-bottom:1.5rem}
.search-outer{background:#fff;border-radius:999px;padding:5px 5px 5px 18px;display:flex;align-items:center;gap:8px;box-shadow:0 8px 24px rgba(0,0,0,.08),0 2px 6px rgba(186,117,23,.12);max-width:500px}
.search-outer i{font-size:16px;color:#BA7517;flex-shrink:0}
.search-outer input{flex:1;border:none;outline:none;font-size:14px;color:#2C1810;background:transparent;font-family:'DM Sans',sans-serif}
.search-outer input::placeholder{color:#B8A090}
.search-btn{padding:8px 20px;background:linear-gradient(135deg,#BA7517,#854F0B);color:#fff;border:none;border-radius:999px;font-size:13px;font-weight:500;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap}

/* ── FILTERS ── */
.filters{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:1.5rem}
.filter-btn{padding:7px 18px;border:1.5px solid transparent;border-radius:999px;background:var(--color-background-primary);font-size:13px;color:var(--color-text-secondary);cursor:pointer;transition:all .18s;font-family:'DM Sans',sans-serif;font-weight:500}
.filter-btn:hover{border-color:#BA7517;color:#BA7517}
.filter-btn.active{background:linear-gradient(135deg,#BA7517,#854F0B);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(186,117,23,.35)}

/* ── GRID ── */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:16px}

/* ── CARD ── */
.card{background:var(--color-background-primary);border-radius:16px;overflow:hidden;border:0.5px solid var(--color-border-tertiary);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column;cursor:pointer}
.card:hover{transform:translateY(-6px) scale(1.01);box-shadow:0 12px 30px rgba(0,0,0,.09),0 4px 10px rgba(186,117,23,.08)}
.card-img{height:140px;position:relative;overflow:hidden;flex-shrink:0}
.card-img-bg{width:100%;height:100%;background-size:cover;background-position:center;transition:transform .3s}
.card:hover .card-img-bg{transform:scale(1.05)}
.hot-badge{position:absolute;top:10px;left:10px;background:linear-gradient(135deg,#E24B4A,#A32D2D);color:#fff;font-size:11px;font-weight:500;padding:4px 10px;border-radius:999px;display:flex;align-items:center;gap:4px;box-shadow:0 2px 8px rgba(0,0,0,.2)}
.rating-badge{position:absolute;top:10px;right:10px;background:rgba(0,0,0,.55);color:#F59E0B;font-size:12px;font-weight:600;padding:4px 8px;border-radius:8px;display:flex;align-items:center;gap:3px;backdrop-filter:blur(4px)}
.rating-badge i{font-size:12px}
.cat-overlay{position:absolute;bottom:8px;left:10px;background:rgba(255,255,255,.92);color:#633806;font-size:11px;font-weight:500;padding:3px 10px;border-radius:999px}

.card-body{padding:.875rem 1rem;flex:1;display:flex;flex-direction:column;gap:4px}
.card-name{font-family:'Playfair Display',serif;font-size:16px;font-weight:600;color:var(--color-text-primary);line-height:1.3}
.card-meta{display:flex;align-items:center;gap:8px;margin-top:2px}
.price-tag{font-size:12px;color:var(--color-text-secondary);font-weight:500}
.dot{width:3px;height:3px;border-radius:50%;background:var(--color-border-secondary);flex-shrink:0}
.card-hours{font-size:12px;color:var(--color-text-secondary)}
.card-desc{font-size:12.5px;color:var(--color-text-secondary);line-height:1.55;margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}

.card-footer{padding:.625rem 1rem .875rem;display:flex;gap:8px;margin-top:auto}
.btn-menu{flex:1;padding:8px;background:linear-gradient(135deg,#BA7517,#854F0B);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:13px;font-weight:500;font-family:'DM Sans',sans-serif;display:flex;align-items:center;justify-content:center;gap:5px;text-decoration:none;transition:opacity .15s}
.btn-menu:hover{opacity:.88}
.btn-icon{width:36px;height:36px;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--color-text-secondary);transition:all .15s;flex-shrink:0}
.btn-icon:hover{border-color:#BA7517;color:#BA7517}
.btn-icon.del:hover{border-color:#E24B4A;color:#E24B4A}

/* ── ADD CARD ── */
.add-card{border:2px dashed var(--color-border-secondary);border-radius:16px;background:transparent;cursor:pointer;color:var(--color-text-secondary);font-size:13px;font-family:'DM Sans',sans-serif;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;min-height:300px;transition:all .18s;width:100%}
.add-card:hover{border-color:#BA7517;color:#BA7517;background:rgba(186,117,23,.03)}
.add-card .add-icon{width:44px;height:44px;border-radius:50%;border:2px dashed currentColor;display:flex;align-items:center;justify-content:center}
.add-card .add-icon i{font-size:20px}

/* ── EMPTY STATE ── */
.empty{grid-column:1/-1;text-align:center;padding:4rem 1rem;color:var(--color-text-secondary)}
.empty-emoji{font-size:3rem;margin-bottom:.75rem}
.empty h3{font-size:16px;font-weight:500;color:var(--color-text-primary);margin-bottom:.4rem}
.empty p{font-size:13px}

/* ── MODAL ── */
.wrapper{position:relative}
.modal-bg{position:absolute;inset:0;background:rgba(0,0,0,.5);display:flex;align-items:flex-start;justify-content:center;padding-top:1.5rem;z-index:10;border-radius:16px}
.modal{background:var(--color-background-primary);border-radius:16px;padding:1.5rem;width:360px;border:0.5px solid var(--color-border-tertiary);max-height:calc(100% - 3rem);overflow-y:auto}
.modal h3{font-family:'Playfair Display',serif;font-size:18px;color:var(--color-text-primary);margin-bottom:1rem}
.modal label{font-size:12px;color:var(--color-text-secondary);display:block;margin-bottom:3px;margin-top:10px}
.modal input,.modal select,.modal textarea{width:100%;padding:8px 12px;border:0.5px solid var(--color-border-secondary);border-radius:10px;font-size:13px;background:var(--color-background-primary);color:var(--color-text-primary);font-family:'DM Sans',sans-serif}
.modal textarea{resize:vertical;min-height:58px}
.two-col{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.modal-btns{display:flex;gap:8px;margin-top:1.25rem}
.btn-save{flex:1;padding:9px;background:linear-gradient(135deg,#BA7517,#854F0B);color:#fff;border:none;border-radius:10px;cursor:pointer;font-size:14px;font-family:'DM Sans',sans-serif}
.btn-cancel{padding:9px 16px;background:transparent;border:0.5px solid var(--color-border-secondary);border-radius:10px;cursor:pointer;font-size:14px;color:var(--color-text-secondary);font-family:'DM Sans',sans-serif}

/* ── DETAIL MODAL ── */
.detail-modal{background:var(--color-background-primary);border-radius:16px;width:360px;overflow:hidden;border:0.5px solid var(--color-border-tertiary)}
.detail-img{height:180px;background-size:cover;background-position:center;position:relative}
.detail-img-overlay{position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.5) 0%,transparent 60%)}
.detail-img-title{position:absolute;bottom:12px;left:14px;right:14px;color:#fff}
.detail-img-title h2{font-family:'Playfair Display',serif;font-size:20px;font-weight:700}
.detail-img-title .sub{font-size:12px;opacity:.85;margin-top:2px}
.detail-body{padding:1rem 1.125rem}
.detail-row{display:flex;align-items:flex-start;gap:10px;padding:8px 0;border-bottom:0.5px solid var(--color-border-tertiary);font-size:13px;color:var(--color-text-secondary)}
.detail-row:last-child{border-bottom:none}
.detail-row i{font-size:15px;color:#BA7517;margin-top:1px;flex-shrink:0}
.detail-row span{flex:1;line-height:1.5;color:var(--color-text-primary)}
.detail-footer{padding:.75rem 1.125rem 1rem;display:flex;gap:8px;border-top:0.5px solid var(--color-border-tertiary)}
</style>

<h2 class="sr-only">菜單總匯 — 探索你的下一餐</h2>
<div class="page">
  <div class="hero">
    <div class="hero-label">🗺 餐飲探索平台</div>
    <h1>探索你的下一餐</h1>
    <p>快速找到最值得吃的餐廳，一鍵查看菜單</p>
    <div class="search-outer">
      <i class="ti ti-search" aria-hidden="true"></i>
      <input type="text" id="search" placeholder="搜尋餐廳名稱或類別…" oninput="render()">
      <button class="search-btn">搜尋</button>
    </div>
  </div>

  <div class="filters" id="filters"></div>
  <div class="wrapper" id="wrapper"></div>
</div>

<script>
const CATS=['全部','中式','日式','韓式','義式','美式','小吃','飲料','素食'];
const COVER={
  中式:'https://images.unsplash.com/photo-1563245372-f21724e3856d?w=600&q=80',
  日式:'https://images.unsplash.com/photo-1553621042-f6e147245754?w=600&q=80',
  韓式:'https://images.unsplash.com/photo-1590301157890-4810ed352733?w=600&q=80',
  義式:'https://images.unsplash.com/photo-1574071318508-1cdbab80d002?w=600&q=80',
  美式:'https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=600&q=80',
  小吃:'https://images.unsplash.com/photo-1512058564366-18510be2db19?w=600&q=80',
  飲料:'https://images.unsplash.com/photo-1558618666-fcd25c85cd64?w=600&q=80',
  素食:'https://images.unsplash.com/photo-1512621776951-a57141f2eefd?w=600&q=80',
};
const EMOJIS={中式:'🥢',日式:'🍣',韓式:'🌶',義式:'🍝',美式:'🍔',小吃:'🧆',飲料:'🧋',素食:'🥗'};

let restaurants=[
  {id:1,name:'鼎泰豐',cat:'中式',url:'https://www.dintaifung.com.tw',hot:true,rating:4.8,phone:'02-2321-8928',address:'台北市大安區信義路二段194號',hours:'周一至五 11:00–20:30',price:'$$',desc:'世界知名的小籠包專賣店，以精緻工藝與一致品質享譽全球。'},
  {id:2,name:'壽司郎',cat:'日式',url:'https://www.sushiro.com.tw',hot:false,rating:4.2,phone:'02-2777-3388',address:'台北市信義區松壽路12號',hours:'每日 11:00–21:30',price:'$$',desc:'日本知名迴轉壽司品牌，平價新鮮、種類豐富，深受家庭歡迎。'},
  {id:3,name:'麥當勞',cat:'美式',url:'https://www.mcdonalds.com.tw',hot:true,rating:3.9,phone:'0800-000-311',address:'各地均有門市',hours:'24小時（部分門市）',price:'$',desc:'全球最大速食連鎖，大麥克、薯條、麥脆雞是經典不敗選擇。'},
  {id:4,name:'韓鄉炭烤',cat:'韓式',url:'https://example.com/korean-bbq',hot:false,rating:4.5,phone:'02-2563-1234',address:'台北市中山區南京東路一段45號',hours:'周二至日 17:00–00:00',price:'$$$',desc:'道地韓式炭烤，厚切五花肉搭配各式小菜，氣氛熱鬧適合聚餐。'},
  {id:5,name:"Domino's Pizza",cat:'義式',url:'https://www.dominos.com.tw',hot:false,rating:4.0,phone:'02-412-5252',address:'線上點餐 / 全台外送',hours:'每日 11:00–22:00',price:'$$',desc:'美式披薩連鎖，提供多樣口味與客製化配料，外送速度快。'},
  {id:6,name:'50嵐',cat:'飲料',url:'https://www.50lan.com',hot:true,rating:4.6,phone:'—',address:'全台 800+ 門市',hours:'依門市而異',price:'$',desc:'台灣手搖飲料龍頭，珍珠奶茶、四季春茶是招牌，糖冰可客製。'},
  {id:7,name:'夜市蚵仔煎',cat:'小吃',url:'https://example.com/oyster',hot:false,rating:4.3,phone:'02-2308-8765',address:'台北市萬華區廣州街108號',hours:'每日 18:00–01:00',price:'$',desc:'傳統台灣小吃，鮮嫩蚵仔搭配特製醬汁，外酥內嫩是夜市必吃。'},
  {id:8,name:'原素廚房',cat:'素食',url:'https://example.com/veggie',hot:false,rating:4.4,phone:'02-2718-9900',address:'台北市松山區民生東路三段130號',hours:'周一至六 11:30–20:00',price:'$$',desc:'創意蔬食料理，以天然食材結合中西風味，讓素食也能精緻美味。'},
];
let nextId=9;
let activeCat='全部';
let modalMode=null; // null | 'edit' | 'add' | 'detail'
let editId=null;
let detailId=null;
let form={name:'',cat:'中式',url:'',phone:'',address:'',hours:'',price:'$$',desc:'',hot:false,rating:4.0};

function resetForm(){form={name:'',cat:'中式',url:'',phone:'',address:'',hours:'',price:'$$',desc:'',hot:false,rating:4.0};}
function cloneForm(r){return{name:r.name,cat:r.cat,url:r.url,phone:r.phone,address:r.address,hours:r.hours,price:r.price,desc:r.desc,hot:r.hot,rating:r.rating};}

function cardHtml(r){
  const img=COVER[r.cat]||COVER['中式'];
  return`<div class="card" onclick="openDetail(${r.id})">
    <div class="card-img">
      <div class="card-img-bg" style="background-image:url('${img}')"></div>
      ${r.hot?'<div class="hot-badge"><i class="ti ti-flame" aria-hidden="true"></i>熱門</div>':''}
      <div class="rating-badge"><i class="ti ti-star-filled" aria-hidden="true"></i>${r.rating.toFixed(1)}</div>
      <div class="cat-overlay">${EMOJIS[r.cat]||'🍴'} ${r.cat}</div>
    </div>
    <div class="card-body">
      <div class="card-name">${r.name}</div>
      <div class="card-meta">
        <span class="price-tag">${r.price}</span>
        <span class="dot"></span>
        <span class="card-hours">${r.hours.split(' ')[0]||r.hours}</span>
      </div>
      <div class="card-desc">${r.desc}</div>
    </div>
    <div class="card-footer" onclick="event.stopPropagation()">
      <a class="btn-menu" href="${r.url}" target="_blank" rel="noopener"><i class="ti ti-external-link" aria-hidden="true"></i>查看菜單</a>
      <button class="btn-icon" onclick="openEdit(${r.id})" aria-label="編輯"><i class="ti ti-edit" aria-hidden="true"></i></button>
      <button class="btn-icon del" onclick="delR(${r.id})" aria-label="刪除"><i class="ti ti-trash" aria-hidden="true"></i></button>
    </div>
  </div>`;
}

function detailModalHtml(r){
  const img=COVER[r.cat]||COVER['中式'];
  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="detail-modal" onclick="event.stopPropagation()">
      <div class="detail-img" style="background-image:url('${img}')">
        <div class="detail-img-overlay"></div>
        <div class="detail-img-title">
          <h2>${r.name}</h2>
          <div class="sub">${EMOJIS[r.cat]} ${r.cat} &nbsp;·&nbsp; ${r.price} &nbsp;·&nbsp; ⭐ ${r.rating.toFixed(1)}</div>
        </div>
        ${r.hot?'<div class="hot-badge" style="top:12px;left:12px"><i class="ti ti-flame" aria-hidden="true"></i>熱門</div>':''}
      </div>
      <div class="detail-body">
        <div class="detail-row"><i class="ti ti-map-pin" aria-hidden="true"></i><span>${r.address}</span></div>
        <div class="detail-row"><i class="ti ti-phone" aria-hidden="true"></i><span>${r.phone}</span></div>
        <div class="detail-row"><i class="ti ti-clock" aria-hidden="true"></i><span>${r.hours}</span></div>
        <div class="detail-row"><i class="ti ti-info-circle" aria-hidden="true"></i><span>${r.desc}</span></div>
      </div>
      <div class="detail-footer">
        <a class="btn-menu" href="${r.url}" target="_blank" rel="noopener"><i class="ti ti-external-link" aria-hidden="true"></i>查看菜單</a>
        <button class="btn-icon" onclick="openEdit(${r.id})" aria-label="編輯"><i class="ti ti-edit" aria-hidden="true"></i></button>
        <button class="btn-icon" onclick="closeModal()" aria-label="關閉"><i class="ti ti-x" aria-hidden="true"></i></button>
      </div>
    </div>
  </div>`;
}

function editModalHtml(){
  const isEdit=editId!==null;
  return`<div class="modal-bg" onclick="if(event.target===this)closeModal()">
    <div class="modal" onclick="event.stopPropagation()">
      <h3>${isEdit?'編輯餐廳':'新增餐廳'}</h3>
      <label>餐廳名稱 *</label>
      <input id="fname" placeholder="例：鼎泰豐" value="${esc(form.name)}" oninput="form.name=this.value">
      <div class="two-col">
        <div><label>類別</label>
        <select id="fcat" onchange="form.cat=this.value">${CATS.filter(c=>c!=='全部').map(c=>`<option${form.cat===c?' selected':''}>${c}</option>`).join('')}</select></div>
        <div><label>價位</label>
        <select id="fprice" onchange="form.price=this.value">${['$','$$','$$$','$$$$'].map(p=>`<option${form.price===p?' selected':''}>${p}</option>`).join('')}</select></div>
      </div>
      <label>菜單網址 *</label>
      <input id="furl" type="url" placeholder="https://..." value="${esc(form.url)}" oninput="form.url=this.value">
      <label>電話</label>
      <input id="fphone" placeholder="02-XXXX-XXXX" value="${esc(form.phone)}" oninput="form.phone=this.value">
      <label>地址</label>
      <input id="faddr" placeholder="台北市…" value="${esc(form.address)}" oninput="form.address=this.value">
      <label>營業時間</label>
      <input id="fhours" placeholder="每日 11:00–21:00" value="${esc(form.hours)}" oninput="form.hours=this.value">
      <label>評分（1–5）</label>
      <input id="frating" type="number" min="1" max="5" step="0.1" value="${form.rating}" oninput="form.rating=parseFloat(this.value)||4.0">
      <label>一句話簡介</label>
      <textarea id="fdesc" oninput="form.desc=this.value">${esc(form.desc)}</textarea>
      <div style="display:flex;align-items:center;gap:8px;margin-top:10px">
        <input type="checkbox" id="fhot"${form.hot?' checked':''} onchange="form.hot=this.checked" style="width:auto">
        <label for="fhot" style="margin:0;font-size:13px;color:var(--color-text-primary)">標記為熱門</label>
      </div>
      <div class="modal-btns">
        <button class="btn-cancel" onclick="closeModal()">取消</button>
        <button class="btn-save" onclick="saveR()">儲存</button>
      </div>
    </div>
  </div>`;
}

function esc(s){return(s||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');}

function render(){
  const q=(document.getElementById('search')||{value:''}).value.toLowerCase();
  document.getElementById('filters').innerHTML=CATS.map(c=>`<button class="filter-btn${activeCat===c?' active':''}" onclick="setCat('${c}')">${c}</button>`).join('');

  let items=restaurants.filter(r=>{
    const mC=activeCat==='全部'||r.cat===activeCat;
    const mQ=!q||r.name.toLowerCase().includes(q)||r.cat.toLowerCase().includes(q)||r.address.toLowerCase().includes(q);
    return mC&&mQ;
  });

  let gridInner=items.map(cardHtml).join('');
  if(items.length===0){
    gridInner=`<div class="empty"><div class="empty-emoji">😶</div><h3>沒找到結果</h3><p>試試其他關鍵字或選擇不同分類</p></div>`;
  }
  gridInner+=`<button class="add-card" onclick="openAdd()"><div class="add-icon"><i class="ti ti-plus" aria-hidden="true"></i></div><span>新增餐廳</span></button>`;

  const w=document.getElementById('wrapper');
  let overlay='';
  if(modalMode==='detail'){const r=restaurants.find(x=>x.id===detailId);if(r)overlay=detailModalHtml(r);}
  else if(modalMode==='edit'||modalMode==='add'){overlay=editModalHtml();}

  w.innerHTML=`<div class="grid">${gridInner}</div>${overlay}`;
}

function setCat(c){activeCat=c;render();}
function openDetail(id){detailId=id;modalMode='detail';render();}
function openAdd(){resetForm();editId=null;modalMode='add';render();}
function openEdit(id){
  const r=restaurants.find(x=>x.id===id);
  if(!r)return;
  form=cloneForm(r);editId=id;modalMode='edit';render();
}
function closeModal(){modalMode=null;editId=null;detailId=null;render();}
function delR(id){
  if(!confirm('確定刪除此餐廳？'))return;
  restaurants=restaurants.filter(x=>x.id!==id);
  render();
}
function saveR(){
  const n=(document.getElementById('fname')||{value:''}).value.trim();
  const u=(document.getElementById('furl')||{value:''}).value.trim();
  form.name=n;form.url=u;
  if(!n||!u)return;
  if(editId!==null){
    const i=restaurants.findIndex(x=>x.id===editId);
    if(i>-1)restaurants[i]={id:editId,...form};
  } else {
    restaurants.push({id:nextId++,...form});
  }
  modalMode=null;editId=null;render();
}
render();
</script>
